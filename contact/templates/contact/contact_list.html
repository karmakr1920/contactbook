<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All contacts</title>
</head>
<body>
    <form action="{% url 'add_contact' %}" method="post">
        {% csrf_token %}
        <input type="text" name="name" placeholder="Name" required>
        <input type="email" name="email" placeholder="Email">
        <input type="text" name="phone" placeholder="Phone">
        <textarea name="address" placeholder="Address"></textarea>
        <label>
            <input type="checkbox" name="is_favourite">
            Is Favourite
        </label>
        <button type="submit">Add Contact</button>
    </form>
    <h1>All contacts</h1>
    {% for contact in  contacts %}
        <p>{{ contact.name }} - {{ contact.email }} - {{ contact.phone }} - {{ contact.address }} - {{ contact.is_favourite }}</p>
        <a href="{% url 'update_contact' contact.id %}">Edit</a>
        <a href="{% url 'delete_contact' contact.id %}" onclick="return confirm('Are you sure you want to delete this contact?')">Delete</a>
    {% endfor %}
</body>
</html>
